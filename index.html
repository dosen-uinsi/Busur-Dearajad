<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simulasi Busur Derajat 180° - By Mathnology</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior-y: none; touch-action: none; }
    body { font-family: 'Nunito', sans-serif; }

    #protractor-svg { touch-action: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .glow-line { filter: drop-shadow(0 0 4px currentColor); }
    
    /* Animasi cerdas: saat ditekan tombol +/- transisi aktif, saat digeser transisi mati */
    .smooth-transition { transition: stroke 0.15s ease, fill 0.15s ease, color 0.15s ease; }
    .anim-transform { transition: all 0.2s ease-out; }
    .no-anim { transition: none !important; }

    .pulse-dot { animation: pulse-ring 2s ease-out infinite; pointer-events: none; }
    @keyframes pulse-ring {
      0% { r: 6; opacity: 0.8; }
      100% { r: 24; opacity: 0; }
    }

    .scenario-btn { transition: all 0.2s ease; white-space: nowrap; flex-shrink: 0; }
    .scenario-btn:hover { transform: translateY(-2px); }
    .scenario-btn.active { box-shadow: 0 0 0 2px var(--primary-action), 0 4px 12px rgba(0,0,0,0.3); background: var(--primary-action) !important; color: var(--bg-color) !important; }

    .btn-precision { transition: background 0.1s; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; }
    .btn-precision:active { transform: scale(0.9); }
    
    .hitbox { cursor: grab; fill: transparent; pointer-events: all; }
    .hitbox:active { cursor: grabbing; }

    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-color: #e2e8f0;
      --primary-action: #38bdf8;
      --secondary-action: #f472b6;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body style="background: var(--bg-color); color: var(--text-color);" class="h-full flex flex-col">
  
  <header class="w-full px-4 py-3 flex items-center justify-between flex-shrink-0 z-20 shadow-md" style="background: var(--surface-color); border-bottom: 1px solid rgba(255,255,255,0.06);">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background: var(--primary-action);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12" /><path d="M2 12h10l7-7" />
        </svg>
      </div>
      <div class="min-w-0">
        <h1 id="app-title" class="text-base md:text-lg font-extrabold leading-tight truncate" style="color: var(--text-color);">Simulasi Busur Derajat</h1>
        <p class="text-[10px] font-semibold tracking-wider" style="color: var(--secondary-action);">By Mathnology</p>
      </div>
    </div>
    <div id="angle-display" class="rounded-xl px-3 py-1.5 text-center flex-shrink-0 smooth-transition" style="background: rgba(0,0,0,0.2);">
      <div id="angle-value" class="text-xl md:text-2xl font-black smooth-transition" style="font-family: 'JetBrains Mono', monospace; color: var(--primary-action);">0°</div>
    </div>
  </header>

  <div class="w-full px-4 py-2 flex-shrink-0 z-10 border-b overflow-x-auto hide-scrollbar" style="background: var(--bg-color); border-color: rgba(255,255,255,0.05);">
    <div id="scenario-buttons" class="flex gap-2 w-max mx-auto md:mx-0"></div>
  </div>

  <div class="flex-1 w-full relative min-h-[35vh]" style="background: radial-gradient(circle at 50% 100%, rgba(56, 189, 248, 0.05) 0%, transparent 70%);">
    <div id="desktop-calc-panel" class="absolute top-4 right-4 z-10 hidden md:block w-64 pointer-events-auto">
      <div class="rounded-xl p-4 shadow-xl backdrop-blur-md" style="background: rgba(30,41,59,0.85); border: 1px solid rgba(255,255,255,0.08);">
        <div class="flex items-center gap-2 mb-3">
          <i data-lucide="calculator" style="width:14px;height:14px;color:var(--secondary-action);"></i> 
          <span class="text-xs font-bold uppercase tracking-wider opacity-60">Perhitungan</span>
        </div>
        <div id="desktop-calc-content" class="grid grid-cols-1 gap-2 text-sm"></div>
      </div>
    </div>

    <svg id="protractor-svg" class="w-full h-full block" preserveAspectRatio="xMidYMid meet">
      <g id="static-layer"></g>
      <g id="dynamic-layer"></g>
    </svg>
  </div>

  <div class="w-full flex-shrink-0 z-20 rounded-t-3xl p-4 md:p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.15)]" style="background: var(--surface-color); border-top: 1px solid rgba(255,255,255,0.08);">
    <div class="mb-3 text-center md:text-left">
      <div class="flex items-center justify-center md:justify-start gap-1.5 mb-1">
        <i data-lucide="info" style="width:14px;height:14px;color:var(--primary-action);"></i>
        <h3 id="info-title" class="text-sm font-bold" style="color: var(--primary-action);"></h3>
      </div>
      <p id="info-desc" class="text-xs opacity-70 leading-relaxed"></p>
    </div>

    <div class="p-3 rounded-2xl flex flex-col gap-2 text-sm w-full" style="background: rgba(0,0,0,0.2);">
      <div id="mobile-calc-content" class="w-full flex justify-between items-center px-1"></div>
    </div>
  </div>

  <script>
// ─── CONFIG & STATE ────────────────────────────────────────
const defaultConfig = {
  app_title: 'Simulasi Busur Derajat',
  background_color: '#0f172a',
  surface_color: '#1e293b',
  text_color: '#e2e8f0',
  primary_action: '#38bdf8',
  secondary_action: '#f472b6',
  font_family: 'Nunito',
};

const scenarios = [
  { id: 'standard', name: 'Mode Standar', icon: 'compass', desc: 'Satu Titik Tetap (0°)', detail: 'Satu sisi terkunci di 0°. Seret sisi lainnya untuk mengukur.', line1Angle: 0, line2Angle: 60 },
  { id: 'free', name: 'Mode Bebas', icon: 'move', desc: 'Pengukuran Bebas', detail: 'Seret kedua garis bebas (0°-180°) untuk mencari selisih sudut.', line1Angle: 45, line2Angle: 135 }
];

let currentScenario = scenarios[0];
let line1Angle = 0;
let line2Angle = 60;
let dragging = null; 
let svgRect = null;
let centerX = 0, centerY = 0, radius = 0;
let isInitialized = false;
let animationFrameId = null;
let isAnimating = false; // Flag untuk transisi CSS

// Cache DOM Elements (Agar sangat ringan saat ditarik)
const els = {};

const svgEl = document.getElementById('protractor-svg');
const staticLayer = document.getElementById('static-layer');
const dynamicLayer = document.getElementById('dynamic-layer');

// ─── UTILS ─────────────────────────────────────────────────
function polarToCart(cx, cy, r, angleDeg) {
  const rad = -angleDeg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function getMeasuredAngle() { return Math.abs(line2Angle - line1Angle); }

function getDynamicColor(angle, baseColor) {
  if (angle === 0) return '#94a3b8'; 
  if (angle > 0 && angle < 90) return baseColor; 
  if (angle === 90) return '#22c55e'; 
  if (angle > 90 && angle < 180) return '#f97316'; 
  if (angle === 180) return '#a855f7'; 
  return baseColor;
}

function updateSvgDimensions() {
  svgRect = svgEl.getBoundingClientRect();
  const w = svgRect.width;
  const h = svgRect.height;
  svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
  
  centerX = w / 2;
  centerY = h - Math.max(20, h * 0.1); 
  
  const maxWidth = (w - 20) / 2; 
  const maxHeight = centerY - 15; 
  radius = Math.min(maxWidth, maxHeight);
}

// ─── INITIALIZATION (HANYA JALAN 1X) ────────────────────────
function initDOM() {
  updateSvgDimensions();
  const textColor = (window.elementSdk?.config.text_color) || defaultConfig.text_color;

  // 1. BUAT LAYER STATIS
  let staticContent = '';
  staticContent += `<path d="M ${centerX + radius + 15} ${centerY} A ${radius + 15} ${radius + 15} 0 0 0 ${centerX - radius - 15} ${centerY} Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>`;
  staticContent += `<line x1="${centerX - radius - 20}" y1="${centerY}" x2="${centerX + radius + 20}" y2="${centerY}" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>`;
  staticContent += `<circle cx="${centerX}" cy="${centerY}" r="5" fill="none" stroke="${textColor}" stroke-width="1.5" opacity="0.6"/>`;
  staticContent += `<line x1="${centerX}" y1="${centerY - 8}" x2="${centerX}" y2="${centerY + 8}" stroke="${textColor}" stroke-width="1" opacity="0.6"/>`;

  for (let deg = 0; deg <= 180; deg += 1) {
    const isMajor = deg % 10 === 0;
    const isMid = deg % 5 === 0;
    if (!isMajor && !isMid && deg % 1 !== 0) continue;

    let tickLen = isMajor ? (radius > 150 ? 16 : 12) : isMid ? 8 : 4;
    const outerP = polarToCart(centerX, centerY, radius, deg);
    const innerP = polarToCart(centerX, centerY, radius - tickLen, deg);
    const opacity = isMajor ? 0.8 : isMid ? 0.4 : 0.2;

    staticContent += `<line x1="${outerP.x}" y1="${outerP.y}" x2="${innerP.x}" y2="${innerP.y}" stroke="${textColor}" stroke-width="${isMajor ? 1.5 : 0.8}" opacity="${opacity}"/>`;

    if (isMajor) {
      const labelP1 = polarToCart(centerX, centerY, radius - (radius > 150 ? 28 : 22), deg);
      staticContent += `<text x="${labelP1.x}" y="${labelP1.y}" text-anchor="middle" dominant-baseline="middle" class="tick-text" fill="${textColor}" opacity="0.9" style="font-size:${radius > 200 ? 12 : 9}px; font-family: 'JetBrains Mono', monospace; font-weight:700;">${deg}</text>`;
      if(radius > 120) {
          const labelP2 = polarToCart(centerX, centerY, radius - (radius > 150 ? 46 : 38), deg);
          staticContent += `<text x="${labelP2.x}" y="${labelP2.y}" text-anchor="middle" dominant-baseline="middle" class="tick-text" fill="${textColor}" opacity="0.3" style="font-size:${radius > 200 ? 10 : 7}px; font-family: 'JetBrains Mono', monospace; font-weight:600;">${180 - deg}</text>`;
      }
    }
  }
  staticLayer.innerHTML = staticContent;

  // 2. BUAT LAYER DINAMIS (KOSONG DULU, TAPI ADA ID-NYA)
  dynamicLayer.innerHTML = `
    <path id="arc-bg" class="angle-arc smooth-transition" stroke-width="3" opacity="0.15" />
    <path id="arc-main" class="angle-arc smooth-transition" stroke-width="3" opacity="0.6" />
    <text id="angle-text" text-anchor="middle" dominant-baseline="middle" class="glow-line smooth-transition" style="font-size:${radius > 150 ? 16 : 12}px; font-family: 'JetBrains Mono', monospace; font-weight:900;"></text>

    <line id="line1" x1="${centerX}" y1="${centerY}" stroke-width="3" class="glow-line anim-transform" stroke-linecap="round" opacity="0.9"/>
    <line id="line2" x1="${centerX}" y1="${centerY}" stroke-width="3" class="glow-line smooth-transition anim-transform" stroke-linecap="round" opacity="0.9"/>

    <circle id="h1-pulse" class="pulse-dot anim-transform" r="12" opacity="0.3" />
    <circle id="h1-vis" class="anim-transform" r="10" opacity="0.9" />
    <circle id="h1-center" class="anim-transform" r="4" fill="var(--bg-color)" />
    <circle id="h1-hitbox" class="hitbox" data-line="line1" r="50" />

    <circle id="h2-pulse" class="pulse-dot smooth-transition anim-transform" r="12" opacity="0.3" />
    <circle id="h2-vis" class="smooth-transition anim-transform" r="10" opacity="0.9" />
    <circle id="h2-center" class="smooth-transition anim-transform" r="4" fill="var(--bg-color)" stroke-width="2.5" />
    <circle id="h2-hitbox" class="hitbox" data-line="line2" r="50" />
  `;

  // 3. CACHE DOM ELEMENTS KE MEMORY (Kunci Performa)
  ['arc-bg', 'arc-main', 'angle-text', 'line1', 'line2', 
   'h1-pulse', 'h1-vis', 'h1-center', 'h1-hitbox', 
   'h2-pulse', 'h2-vis', 'h2-center', 'h2-hitbox'].forEach(id => {
    els[id] = document.getElementById(id);
  });

  isInitialized = true;
}

// ─── UPDATE ATTRIBUTES (SANGAT RINGAN) ─────────────────────
function updateProtractor() {
  if (!isInitialized) initDOM();

  const basePrimaryColor = (window.elementSdk?.config.primary_action) || defaultConfig.primary_action;
  const secondaryColor = (window.elementSdk?.config.secondary_action) || defaultConfig.secondary_action;
  
  const measuredAngle = getMeasuredAngle();
  const dynamicColor = getDynamicColor(measuredAngle, basePrimaryColor);
  const canDragLine1 = currentScenario.id === 'free';
  const handle1Color = canDragLine1 ? secondaryColor : 'rgba(255,255,255,0.2)';

  const arcRadius = radius * 0.35;
  let minA = Math.min(line1Angle, line2Angle);
  let maxA = Math.max(line1Angle, line2Angle);

  // Toggle CSS Animation class agar tidak ngelag saat ditarik
  const movingEls = [els['line1'], els['line2'], els['h1-pulse'], els['h1-vis'], els['h1-center'], els['h2-pulse'], els['h2-vis'], els['h2-center']];
  movingEls.forEach(el => {
      if(isAnimating) el.classList.remove('no-anim');
      else el.classList.add('no-anim');
  });

  // 1. Update Area Arsiran & Simbol
  if (measuredAngle > 0) {
    els['arc-bg'].style.display = 'block';
    els['arc-main'].style.display = 'block';
    els['angle-text'].style.display = 'block';

    if (measuredAngle === 90) {
      const sqLen = arcRadius * 0.6;
      const p1 = polarToCart(centerX, centerY, sqLen, minA);
      const p2 = polarToCart(centerX, centerY, sqLen, maxA);
      const pMid = polarToCart(centerX, centerY, sqLen * 1.414, minA + 45); 
      
      els['arc-main'].setAttribute('d', `M ${p1.x} ${p1.y} L ${pMid.x} ${pMid.y} L ${p2.x} ${p2.y}`);
      els['arc-bg'].setAttribute('d', `M ${centerX} ${centerY} L ${p1.x} ${p1.y} L ${pMid.x} ${pMid.y} L ${p2.x} ${p2.y} Z`);
    } else {
      const start = polarToCart(centerX, centerY, arcRadius, minA);
      const end = polarToCart(centerX, centerY, arcRadius, maxA);
      els['arc-main'].setAttribute('d', `M ${start.x} ${start.y} A ${arcRadius} ${arcRadius} 0 0 0 ${end.x} ${end.y}`);
      els['arc-bg'].setAttribute('d', `M ${centerX} ${centerY} L ${start.x} ${start.y} A ${arcRadius} ${arcRadius} 0 0 0 ${end.x} ${end.y} Z`);
    }

    els['arc-main'].setAttribute('stroke', dynamicColor);
    els['arc-bg'].setAttribute('fill', dynamicColor);

    // Teks di tengah arc
    const midAngle = (line1Angle + line2Angle) / 2;
    const labelDist = arcRadius + (radius > 150 ? 25 : 18);
    const labelP = polarToCart(centerX, centerY, labelDist, midAngle);
    els['angle-text'].setAttribute('x', labelP.x);
    els['angle-text'].setAttribute('y', labelP.y);
    els['angle-text'].setAttribute('fill', dynamicColor);
    els['angle-text'].textContent = `${measuredAngle}°`;
  } else {
    els['arc-bg'].style.display = 'none';
    els['arc-main'].style.display = 'none';
    els['angle-text'].style.display = 'none';
  }

  // 2. Update Garis (Menggunakan direct attributes sangat cepat)
  const lineLen = radius + 15; 
  const l1End = polarToCart(centerX, centerY, lineLen, line1Angle);
  const l2End = polarToCart(centerX, centerY, lineLen, line2Angle);

  els['line1'].setAttribute('x2', l1End.x);
  els['line1'].setAttribute('y2', l1End.y);
  els['line1'].setAttribute('stroke', secondaryColor);

  els['line2'].setAttribute('x2', l2End.x);
  els['line2'].setAttribute('y2', l2End.y);
  els['line2'].setAttribute('stroke', dynamicColor);

  // 3. Update Gagang 1
  ['h1-pulse', 'h1-vis', 'h1-center', 'h1-hitbox'].forEach(id => {
    els[id].setAttribute('cx', l1End.x);
    els[id].setAttribute('cy', l1End.y);
  });
  els['h1-pulse'].setAttribute('fill', handle1Color);
  els['h1-vis'].setAttribute('fill', handle1Color);
  els['h1-vis'].setAttribute('opacity', canDragLine1 ? "0.9" : "0.3");
  els['h1-center'].setAttribute('stroke', handle1Color);
  els['h1-center'].setAttribute('stroke-width', '2.5');
  els['h1-hitbox'].style.pointerEvents = canDragLine1 ? "all" : "none";

  // 4. Update Gagang 2
  ['h2-pulse', 'h2-vis', 'h2-center', 'h2-hitbox'].forEach(id => {
    els[id].setAttribute('cx', l2End.x);
    els[id].setAttribute('cy', l2End.y);
  });
  els['h2-pulse'].setAttribute('fill', dynamicColor);
  els['h2-vis'].setAttribute('fill', dynamicColor);
  els['h2-center'].setAttribute('stroke', dynamicColor);

  // Update UI Teks Bawah
  document.getElementById('angle-value').textContent = `${measuredAngle}°`;
  document.getElementById('angle-value').style.color = dynamicColor;
  updateCalcPanels(dynamicColor);
}

// ─── KONTROL PRESISI MANUAL ────────────────────────────────
window.changeAngle = function(line, amount) {
  if(line === 'line1' && currentScenario.id !== 'free') return;
  isAnimating = true; // Nyalakan animasi agar halus saat ditekan tombol
  
  if(line === 'line1') line1Angle = Math.max(0, Math.min(180, line1Angle + amount));
  else line2Angle = Math.max(0, Math.min(180, line2Angle + amount));
  
  updateProtractor();
}

function updateCalcPanels(dynamicColor) {
  const measured = getMeasuredAngle();
  const secondaryColor = (window.elementSdk?.config.secondary_action) || defaultConfig.secondary_action;
  
  let angleType = measured === 90 ? 'Siku-siku' : 
                  measured > 0 && measured < 90 ? 'Lancip' : 
                  measured > 90 && measured < 180 ? 'Tumpul' : 
                  measured === 180 ? 'Garis Lurus' : 'Sudut Nol';

  const canDragLine1 = currentScenario.id === 'free';

  // Desktop Card
  document.getElementById('desktop-calc-content').innerHTML = `
    <div class="rounded-lg p-2 flex justify-between items-center" style="background:rgba(255,255,255,0.03);">
      <div class="text-xs opacity-60">Sisi 1</div>
      <div class="font-bold" style="font-family:'JetBrains Mono',monospace; color:${secondaryColor};">${line1Angle}°</div>
    </div>
    <div class="rounded-lg p-2 flex justify-between items-center" style="background:rgba(255,255,255,0.03);">
      <div class="text-xs opacity-60">Sisi 2</div>
      <div class="font-bold" style="font-family:'JetBrains Mono',monospace; color:${dynamicColor};">${line2Angle}°</div>
    </div>
    <div class="rounded-lg p-2 mt-1" style="background:rgba(255,255,255,0.05);">
      <div class="text-[10px] opacity-60 mb-1">Total Sudut</div>
      <div class="font-bold text-lg smooth-transition" style="color:${dynamicColor};">${measured}° <span class="text-xs font-normal opacity-70">(${angleType})</span></div>
    </div>
  `;

  // Mobile Bottom Sheet
  document.getElementById('mobile-calc-content').innerHTML = `
    <div class="flex flex-col items-center gap-1 w-1/3">
      <span class="text-[10px] opacity-50 uppercase tracking-wider">Sisi 1</span> 
      <div class="flex items-center gap-2">
        <button onclick="changeAngle('line1', -1)" class="btn-precision" style="background: ${canDragLine1 ? secondaryColor+'30' : 'rgba(255,255,255,0.05)'}; color: ${canDragLine1 ? secondaryColor : 'rgba(255,255,255,0.2)'};" ${!canDragLine1 ? 'disabled' : ''}>-</button>
        <span class="text-lg w-8 text-center" style="color:${secondaryColor}; font-weight:900; font-family:'JetBrains Mono', monospace;">${line1Angle}°</span>
        <button onclick="changeAngle('line1', 1)" class="btn-precision" style="background: ${canDragLine1 ? secondaryColor+'30' : 'rgba(255,255,255,0.05)'}; color: ${canDragLine1 ? secondaryColor : 'rgba(255,255,255,0.2)'};" ${!canDragLine1 ? 'disabled' : ''}>+</button>
      </div>
    </div>

    <div class="flex flex-col items-center justify-center w-1/3">
      <span class="text-[10px] opacity-50 uppercase tracking-wider">Tipe Sudut</span> 
      <div class="px-2 py-1 mt-1 rounded-full text-[10px] md:text-xs font-bold whitespace-nowrap smooth-transition" style="background: ${dynamicColor}20; color:${dynamicColor}; border: 1px solid ${dynamicColor}40;">${angleType}</div>
    </div>

    <div class="flex flex-col items-center gap-1 w-1/3">
      <span class="text-[10px] opacity-50 uppercase tracking-wider">Sisi 2</span> 
      <div class="flex items-center gap-2">
        <button onclick="changeAngle('line2', -1)" class="btn-precision" style="background: ${dynamicColor}30; color: ${dynamicColor};">-</button>
        <span class="text-lg w-8 text-center smooth-transition" style="color:${dynamicColor}; font-weight:900; font-family:'JetBrains Mono', monospace;">${line2Angle}°</span>
        <button onclick="changeAngle('line2', 1)" class="btn-precision" style="background: ${dynamicColor}30; color: ${dynamicColor};">+</button>
      </div>
    </div>
  `;
}

// ─── SCENARIOS ─────────────────────────────────────────────
function loadScenario(scenario) {
  isAnimating = true; // Nyalakan animasi saat ganti mode
  currentScenario = scenario;
  line1Angle = scenario.line1Angle;
  line2Angle = scenario.line2Angle;

  document.getElementById('info-title').textContent = scenario.name;
  document.getElementById('info-desc').textContent = scenario.detail;

  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === scenario.id);
  });

  updateProtractor();
}

function buildScenarioButtons() {
  const container = document.getElementById('scenario-buttons');
  container.innerHTML = '';
  scenarios.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'scenario-btn rounded-full px-4 py-2 text-xs md:text-sm font-bold flex items-center gap-2 backdrop-blur-md';
    btn.style.cssText = `background:rgba(30,41,59,0.5); border:1px solid rgba(255,255,255,0.1); color: var(--text-color);`;
    btn.dataset.id = s.id;
    btn.innerHTML = `<i data-lucide="${s.icon}" style="width:14px;height:14px;"></i><span>${s.name}</span>`;
    btn.addEventListener('click', () => loadScenario(s));
    container.appendChild(btn);
  });
}

// ─── DRAG INTERACTION ──────────────────────────────────────
function getAngleFromEvent(e) {
  const viewBox = svgEl.viewBox.baseVal;
  const scaleX = viewBox.width / svgRect.width;
  const scaleY = viewBox.height / svgRect.height;

  let clientX, clientY;
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }

  const svgX = (clientX - svgRect.left) * scaleX;
  const svgY = (clientY - svgRect.top) * scaleY;
  const dx = svgX - centerX;
  const dy = svgY - centerY;
  
  let angle = Math.atan2(-dy, dx) * 180 / Math.PI; 
  if (angle < 0) angle += 360;

  if (angle > 180) {
    if (angle < 270) angle = 180; 
    else angle = 0;               
  }
  
  let roundedAngle = Math.round(angle);

  // Efek magnet kelipatan 5 derajat
  if (Math.abs(roundedAngle % 5) <= 1 || Math.abs(roundedAngle % 5) >= 4) {
    roundedAngle = Math.round(roundedAngle / 5) * 5;
  }

  return roundedAngle;
}

function onPointerDown(e) {
  const target = e.target;
  if (!target.dataset || !target.dataset.line) return;

  const lineName = target.dataset.line;
  const canDragLine1 = currentScenario.id === 'free';
  if (lineName === 'line1' && !canDragLine1) return;

  isAnimating = false; // Matikan animasi agar instan mengikuti jari
  dragging = lineName;
  updateSvgDimensions(); 
  e.preventDefault(); 
}

function onPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();

  if (animationFrameId) cancelAnimationFrame(animationFrameId);
  // Gunakan requestAnimationFrame untuk sync layar HP (60hz / 120hz)
  animationFrameId = requestAnimationFrame(() => {
    const angle = getAngleFromEvent(e);
    // Hentikan proses jika sudut tidak berubah (Menghemat CPU!)
    if (dragging === 'line1' && line1Angle !== angle) {
        line1Angle = angle;
        updateProtractor(); 
    } else if (dragging === 'line2' && line2Angle !== angle) {
        line2Angle = angle;
        updateProtractor(); 
    }
  });
}

function onPointerUp() { dragging = null; }

svgEl.addEventListener('mousedown', onPointerDown);
window.addEventListener('mousemove', onPointerMove); 
window.addEventListener('mouseup', onPointerUp);

svgEl.addEventListener('touchstart', onPointerDown, { passive: false });
window.addEventListener('touchmove', onPointerMove, { passive: false });
window.addEventListener('touchend', onPointerUp);

// ─── ELEMENT SDK ───────────────────────────────────────────
function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const text = config.text_color || defaultConfig.text_color;
  const primary = config.primary_action || defaultConfig.primary_action;
  const secondary = config.secondary_action || defaultConfig.secondary_action;
  const font = config.font_family || defaultConfig.font_family;

  document.documentElement.style.setProperty('--bg-color', bg);
  document.documentElement.style.setProperty('--surface-color', surface);
  document.documentElement.style.setProperty('--text-color', text);
  document.documentElement.style.setProperty('--primary-action', primary);
  document.documentElement.style.setProperty('--secondary-action', secondary);
  document.body.style.fontFamily = `${font}, Nunito, sans-serif`;

  isInitialized = false; // Paksa render ulang layer statis
  updateProtractor();
}

if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => { applyConfig(config); }
  });
}

function init() {
  lucide.createIcons();
  buildScenarioButtons();
  setTimeout(() => { 
      loadScenario(scenarios[0]);
  }, 50);
}

init();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    isInitialized = false; // Rebuild layer statis jika HP diputar
    updateProtractor();
  }, 100);
});
  </script>
</body>
